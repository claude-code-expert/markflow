<svg width="270" height="58" viewBox="0 0 270 58" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&amp;display=swap');
    </style>
  </defs>

  <!-- "Mark" -->
  <text
    x="0"
    y="28"
    font-family="'Sora', 'DM Sans', sans-serif"
    font-weight="600"
    font-size="32"
    letter-spacing="-0.5"
    fill="#1A1916"
  >Mark</text>

  <!-- # icon: 23px to match cap height of 32px font, 3px gap after Mark -->
  <rect x="84" y="6" width="23" height="23" rx="5" fill="#1A56DB"/>
  <rect x="90" y="14" width="11" height="2" rx="1" fill="white" opacity="0.95"/>
  <rect x="90" y="18" width="11" height="2" rx="1" fill="white" opacity="0.95"/>
  <rect x="93" y="11" width="2" height="13" rx="1" fill="white" opacity="0.95"/>
  <rect x="98" y="11" width="2" height="13" rx="1" fill="white" opacity="0.95"/>
  <!-- accent dot -->
  <circle cx="104" cy="8" r="2.5" fill="#EEF3FF" opacity="0.9"/>
  <circle cx="104" cy="8" r="1.3" fill="#1A56DB"/>

  <!-- "Flow": 3px gap after # box -->
  <text
    x="110"
    y="28"
    font-family="'Sora', 'DM Sans', sans-serif"
    font-weight="700"
    font-size="32"
    letter-spacing="-0.5"
    fill="#1A56DB"
  >Flow</text>

  <!-- Tagline: 5px gap below baseline -->
  <text
    x="0"
    y="52"
    font-family="'Sora', 'DM Sans', sans-serif"
    font-weight="700"
    font-size="18"
    letter-spacing="0.8"
    fill="#000000"
  >MARKDOWN KNOWLEDGE SYSTEM</text>
</svg>
